<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="pb-site-base" content="">
    <title>Updates — Pandesal Bytes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=M+PLUS+2:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="header-spacer"></div>

    <section class="hero-section hero-section--home">
        <div class="container">
            <div class="hero-home-inner">
                <p class="site-tagline mono-eyebrow">Blog &amp; Updates <span class="tagline-sep">/</span> ブログ・お知らせ</p>
                <h1 class="hero-title hero-title--home">Updates</h1>
                <p class="hero-subtitle hero-subtitle--home" style="max-width: none;">Release notes, new features, and news from Pandesal Bytes.</p>
            </div>
        </div>
    </section>

    <main class="container main-home">
        <section class="page-section page-section--tight-top">

            <header class="section-block-head">
                <h2 class="section-block-title" id="filter-label">All Posts</h2>
                <span class="section-block-label mono-eyebrow" id="filter-count" aria-hidden="true"></span>
            </header>
            <div class="section-block-rule" role="presentation"></div>

            <div id="filter-bar" class="updates-filter-bar" style="display: none;"></div>
            <div id="posts-container" class="updates-posts-grid"></div>
            <p id="posts-empty" class="updates-empty" style="display: none;">No updates yet. Check back soon.</p>

        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../shared/paths.js"></script>
    <script src="../shared/scripts.js" defer></script>
    <script>
        const PRODUCT_NAMES = {
            'camerashelf':      'Camera Shelf',
            'camerapouch':      'Camera Pouch',
            'simulatedfilm':    'Simulated Film',
            'spent-today':      'Spent Today',
            'inventory':        'My Inventory Stack',
            'habit-habit':      'Habit Habit',
            'pattern-projects': 'Pattern Projects',
            'recipe-mini':      'Recipe Mini',
            'vocab-bento':      'Vocab Bento',
        };

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function renderPosts(posts) {
            const container = document.getElementById('posts-container');
            const empty     = document.getElementById('posts-empty');
            container.innerHTML = '';
            if (posts.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            posts.forEach(post => {
                const tagHTML = post.tags.map(t =>
                    `<span class="post-tag">${PRODUCT_NAMES[t] || t}</span>`
                ).join('');
                const card = document.createElement('a');
                card.href = `post.html?slug=${encodeURIComponent(post.slug)}`;
                card.className = 'post-card card-style';
                card.innerHTML = `
                    <div class="post-card-inner">
                        <div>
                            <div class="post-card-meta">
                                <span class="post-date">${formatDate(post.date)}</span>
                                ${tagHTML ? `<div class="post-tags">${tagHTML}</div>` : ''}
                            </div>
                            <h2 class="post-card-title">${post.title}</h2>
                            <p class="post-card-excerpt">${post.excerpt}</p>
                        </div>
                        <span class="post-read-more">Read more →</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function applyFilter(tag, posts) {
            const filtered = tag ? posts.filter(p => p.tags.includes(tag)) : posts;
            renderPosts(filtered);
            const filterLabel = document.getElementById('filter-label');
            const filterCount = document.getElementById('filter-count');
            if (filterLabel) filterLabel.textContent = tag ? (PRODUCT_NAMES[tag] || tag) : 'All Posts';
            if (filterCount) filterCount.textContent = filtered.length > 0 ? String(filtered.length) : '';
        }

        async function init() {
            let posts = [];
            try {
                const res  = await fetch('posts.json');
                posts = await res.json();
            } catch (e) {
                document.getElementById('posts-empty').style.display = 'block';
                return;
            }

            const params     = new URLSearchParams(window.location.search);
            let   activeTag  = params.get('tag') || '';

            // Build filter bar
            const allTags  = [...new Set(posts.flatMap(p => p.tags))];
            const filterBar = document.getElementById('filter-bar');

            if (allTags.length > 0) {
                filterBar.style.display = 'flex';

                const allBtn = document.createElement('button');
                allBtn.className   = 'filter-btn' + (activeTag === '' ? ' active' : '');
                allBtn.textContent = 'All';
                allBtn.dataset.tag = '';
                filterBar.appendChild(allBtn);

                allTags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className   = 'filter-btn' + (activeTag === tag ? ' active' : '');
                    btn.textContent = PRODUCT_NAMES[tag] || tag;
                    btn.dataset.tag = tag;
                    filterBar.appendChild(btn);
                });

                filterBar.addEventListener('click', e => {
                    const btn = e.target.closest('.filter-btn');
                    if (!btn) return;
                    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeTag = btn.dataset.tag;
                    applyFilter(activeTag, posts);
                    // Keep URL in sync so filtered views are shareable
                    const newUrl = activeTag
                        ? `?tag=${encodeURIComponent(activeTag)}`
                        : window.location.pathname;
                    history.pushState({ tag: activeTag }, '', newUrl);
                });
            }

            // Restore filter on browser back / forward
            window.addEventListener('popstate', e => {
                const tag = e.state?.tag ?? new URLSearchParams(window.location.search).get('tag') ?? '';
                filterBar.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.tag === tag);
                });
                applyFilter(tag, posts);
            });

            applyFilter(activeTag, posts);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
